spring.application.name=kolpop

spring.datasource.url=jdbc:mysql://localhost:3306/kolpop
spring.datasource.username=root
spring.datasource.password=1234

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.data.redis.host=localhost
spring.data.redis.port=6379

auth.jwt.secret=kolpop-development-secret-key-change-this-value
auth.jwt.access-token-expires-in=3600
auth.jwt.refresh-token-expires-in=604800

coolsms.api-key=${COOLSMS_API_KEY:}
coolsms.api-secret=${COOLSMS_API_SECRET:}
coolsms.sender=${COOLSMS_SENDER:}
