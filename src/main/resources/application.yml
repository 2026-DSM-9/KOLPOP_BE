server:
  port: ${SERVER_PORT}

spring:
  application:
    name: kolpop
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
    show-sql: ${SPRING_JPA_SHOW_SQL}
    properties:
      hibernate:
        format_sql: true
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET}
    access-token-expires-in: ${AUTH_JWT_ACCESS_TOKEN_EXPIRES_IN}
    refresh-token-expires-in: ${AUTH_JWT_REFRESH_TOKEN_EXPIRES_IN}

coolsms:
  api-key: ${COOLSMS_API_KEY}
  api-secret: ${COOLSMS_API_SECRET}
  sender: ${COOLSMS_SENDER}


aws:
  s3:
    region: ${AWS_REGION}
    bucket: ${AWS_S3_BUCKET}
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
    endpoint: ${AWS_S3_ENDPOINT}
    public-base-url: ${AWS_S3_PUBLIC_BASE_URL}
    prefix: ${AWS_S3_PREFIX}
    path-style-access-enabled: ${AWS_S3_PATH_STYLE_ACCESS_ENABLED}

public-data:
  festival:
    endpoint: ${PUBLIC_DATA_FESTIVAL_ENDPOINT:https://api.odcloud.kr/api/15013104/v1/uddi:configure-me}
    service-key: ${PUBLIC_DATA_SERVICE_KEY:}
    per-page: ${PUBLIC_DATA_FESTIVAL_PER_PAGE:1000}
    max-pages: ${PUBLIC_DATA_FESTIVAL_MAX_PAGES:10}
    cache-ttl-seconds: ${PUBLIC_DATA_FESTIVAL_CACHE_TTL_SECONDS:21600}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
