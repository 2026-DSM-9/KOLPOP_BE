spring:
  application:
    name: kolpop
  datasource:
    url: jdbc:mysql://localhost:3306/kolpop
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
  data:
    redis:
      host: localhost
      port: 6379

auth:
  jwt:
    secret: kolpop-development-secret-key-change-this-value
    access-token-expires-in: 3600
    refresh-token-expires-in: 604800

coolsms:
  api-key: ${COOLSMS_API_KEY:}
  api-secret: ${COOLSMS_API_SECRET:}
  sender: ${COOLSMS_SENDER:}

aws:
  s3:
    region: ${AWS_REGION:ap-northeast-2}
    bucket: ${AWS_S3_BUCKET:}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    endpoint: ${AWS_S3_ENDPOINT:}
    public-base-url: ${AWS_S3_PUBLIC_BASE_URL:}
    prefix: ${AWS_S3_PREFIX:uploads}
    path-style-access-enabled: ${AWS_S3_PATH_STYLE_ACCESS_ENABLED:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
